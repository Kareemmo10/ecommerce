                { q: "True or False: 'Explainability' is unnecessary for employees as long as the AI provides the correct data-driven insights.", opts: ["True", "False"], a: "False", type: "T/F" },
                { q: "True or False: AI-driven chatbots enable eCommerce platforms to offer 24/7 support while escalating complex issues to humans.", opts: ["True", "False"], a: "True", type: "T/F" },
            ],
            12: [
                { q: "What is the primary function of 'Predictive Analytics' in customer behavior?", opts: ["To record past transactions for tax purposes", "To use AI algorithms to forecast future customer behavior based on historical data", "To manually segment customers by their physical location", "To delete old customer data to save server space"], a: "To use AI algorithms to forecast future customer behavior based on historical data", type: "MCQ" },
                { q: "Which AI model is used to identify customers who are at risk of discontinuing their relationship with a brand?", opts: ["Purchase Propensity Model", "Dynamic Personalization Model", "Churn Prediction Model", "Sentiment Analysis Model"], a: "Churn Prediction Model", type: "MCQ" },
                { q: "'Sentiment Analysis' primarily uses which technology to understand how customers feel about a brand?", opts: ["Computer Vision", "Natural Language Processing (NLP)", "Robotic Process Automation (RPA)", "Blockchain"], a: "Natural Language Processing (NLP)", type: "MCQ" },
                { q: "How does AI-driven 'Real-Time Analytics' impact cart abandonment?", opts: ["It prevents customers from adding items to a cart", "It triggers immediate interventions, such as a discount or chatbot support, when abandonment is detected", "It waits 24 hours before sending a generic follow-up email", "It automatically charges the customer's card for abandoned items"], a: "It triggers immediate interventions, such as a discount or chatbot support, when abandonment is detected", type: "MCQ" },
                { q: "'Automated A/B Testing' allows businesses to:", opts: ["Manually design every version of a webpage", "Use AI to analyze customer behavior in real-time to determine which marketing version performs better", "Eliminate all marketing campaigns", "Track the physical movement of customers in a store"], a: "Use AI to analyze customer behavior in real-time to determine which marketing version performs better", type: "MCQ" },
                { q: "Which integration provides a 'holistic understanding' of customer behavior across different platforms?", opts: ["Single-channel analytics", "Cross-Channel Analytics", "Manual data entry from paper receipts", "Ignoring social media data"], a: "Cross-Channel Analytics", type: "MCQ" },
                { q: "True or False: Behavioral Segmentation groups customers based on shared actions like browsing patterns and purchase frequency.", opts: ["True", "False"], a: "True", type: "T/F" },
                { q: "True or False: Netflix's use of AI to predict viewing behavior is irrelevant to the world of eCommerce.", opts: ["True", "False"], a: "False", type: "T/F" },
                { q: "True or False: Future AI models in analytics may analyze subtle factors like a customer's attention span or mood.", opts: ["True", "False"], a: "True", type: "T/F" },
            ],
            13: [
                { q: "What does the 'Internet of Things' (IoT) refer to in the context of eCommerce?", opts: ["A platform specifically for hosting web-based search engines", "A network of interconnected devices that share data over the internet to enhance customer and logistics experiences", "A strategy to replace all digital shopping with physical in-store visits", "A method for manually tracking inventory using paper logs"], a: "A network of interconnected devices that share data over the internet to enhance customer and logistics experiences", type: "MCQ" },
                { q: "Which device is specifically noted for allowing consumers to perform hands-free, voice-activated shopping?", opts: ["Smart washing machines", "Wearable fitness trackers", "Smart home assistants like Amazon Alexa or Google Home", "GPS-enabled delivery trucks"], a: "Smart home assistants like Amazon Alexa or Google Home", type: "MCQ" },
                { q: "How does AIoT integration facilitate 'Predictive Reordering'?", opts: ["By asking the customer to fill out a weekly survey on their needs", "By analyzing data from connected appliances to predict when supplies like detergent or groceries will run low", "By automatically charging a customer's card for items they viewed but didn't buy", "By sending a human representative to the customer's home to check inventory"], a: "By analyzing data from connected appliances to predict when supplies like detergent or groceries will run low", type: "MCQ" },
                { q: "What is a primary benefit of using IoT sensors for 'Condition Monitoring' in the supply chain?", opts: ["It tracks the total social media mentions of a product", "It ensures perishable goods are stored and transported under optimal temperature and light conditions", "It identifies the cheapest supplier for raw materials", "It reduces the need for high-speed internet in warehouses"], a: "It ensures perishable goods are stored and transported under optimal temperature and light conditions", type: "MCQ" },
                { q: "According to the report, what is the most significant barrier to the widespread adoption of AI-IoT integration among consumers?", opts: ["A lack of interest in convenience", "Concerns about data privacy and the security of personal information", "The unavailability of smart home devices in North America", "High costs of high-speed internet in all major global markets"], a: "Concerns about data privacy and the security of personal information", type: "MCQ" },
                { q: "Which emerging technology is cited as critical for enabling real-time AI-IoT interactions by reducing latency?", opts: ["3G cellular networks", "Blockchain ledgers", "5G and Edge Computing", "Static cloud storage"], a: "5G and Edge Computing", type: "MCQ" },
                { q: "True or False: Wearable technology can be used to deliver personalized offers based on a user's real-time activity, such as finishing a workout.", opts: ["True", "False"], a: "True", type: "T/F" },
                { q: "True or False: Experts predict that full AI and IoT integration in eCommerce will be mainstream within the next 12 months.", opts: ["True", "False"], a: "False", type: "T/F" },
                { q: "True or False: Proactive issue resolution involves using IoT data to detect a malfunctioning appliance and scheduling a repair before the customer notices.", opts: ["True", "False"], a: "True", type: "T/F" },
            ],
            14: [
                { q: "According to the report, what is the average percentage of online shopping carts that are abandoned before a purchase is completed?", opts: ["30%", "50%", "Nearly 70%", "90%"], a: "Nearly 70%", type: "MCQ" },
                { q: "Which factor is identified as one of the most common causes of cart abandonment at the final checkout stage?", opts: ["Too many product images", "High shipping fees and unexpected costs", "Frequent social media notifications", "Availability of too many payment methods"], a: "High shipping fees and unexpected costs", type: "MCQ" },
                { q: "How does AI utilize 'Behavioral Analysis' to prevent abandonment before it occurs?", opts: ["By automatically charging the customer's saved credit card", "By identifying patterns of hesitation, such as mouse movements or long pauses, to trigger preemptive interventions", "By blocking the user from leaving the website", "By deleting the items in the cart to clear server space"], a: "By identifying patterns of hesitation, such as mouse movements or long pauses, to trigger preemptive interventions", type: "MCQ" },
                { q: "What is a key feature of Rezolve AI's 'Brain Commerce' approach to reducing abandonment?", opts: ["It uses a traditional static search bar", "It replaces site search with dynamic, conversational engagement in 95 languages", "It forces users to create an account before browsing", "It only supports English-speaking markets"], a: "It replaces site search with dynamic, conversational engagement in 95 languages", type: "MCQ" },
                { q: "Which AI-driven strategy is used to recover sales after a customer has already left the website?", opts: ["Smart Autofill features", "Personalized email sequences and dynamic retargeting ads", "One-click checkout optimization", "Real-time chatbot support pop-ups"], a: "Personalized email sequences and dynamic retargeting ads", type: "MCQ" },
                { q: "How does 'Dynamic Pricing' help reduce abandonment for price-sensitive customers?", opts: ["By increasing prices during high-traffic hours", "By offering personalized, real-time discounts or incentives like free shipping to encourage conversion", "By hiding the final price until the transaction is complete", "By offering the same discount to every single visitor"], a: "By offering personalized, real-time discounts or incentives like free shipping to encourage conversion", type: "MCQ" },
                { q: "True or False: Requiring a customer to create an account is considered a 'friction point' that can lead to cart abandonment.", opts: ["True", "False"], a: "True", type: "T/F" },
                { q: "True or False: AI-powered 'Smart Autofill' features are intended to slow down the checkout process for security reasons.", opts: ["True", "False"], a: "False", type: "T/F" },
                { q: "True or False: Rezolve AI's 'Brain Assistant' provides 24/7 support and can escalate complex queries to human agents.", opts: ["True", "False"], a: "True", type: "T/F" },
            ],
        };

        let currentChapter = null;
        let currentIdx = 0;
        let score = 0;
        let correctFound = false;

        // UI Elements
        const chapterSelector = document.getElementById('chapter-selector');
        const chaptersGrid = document.getElementById('chapters-grid');
        const quizContainer = document.getElementById('quiz-container');
        const qText = document.getElementById('question-text');
        const optionsGrid = document.getElementById('options-grid');
        const progressText = document.getElementById('progress');
        const scoreText = document.getElementById('score-count');
        const qType = document.getElementById('question-type');
        const actionArea = document.getElementById('action-area');
        const message = document.getElementById('message');
        const nextBtn = document.getElementById('next-btn');
        const backBtn = document.getElementById('back-to-chapters');
        const finishScreen = document.getElementById('finish-screen');

        // Initialize chapter selector
        function initChapterSelector() {
            chaptersGrid.innerHTML = '';
            for (let i = 1; i <= 14; i++) {
                const btn = document.createElement('button');
                btn.className = "p-4 bg-zinc-800 hover:bg-blue-600 border border-zinc-700 rounded-xl font-bold text-lg transition-all active:scale-95";
                btn.innerText = `Chapter ${i}`;
                btn.onclick = () => startChapter(i);
                chaptersGrid.appendChild(btn);
            }
        }

        function startChapter(chapterNum) {
            const questions = chapterQuestions[chapterNum];
            if (!questions || questions.length === 0) {
                alert(`اسف، لم يتم إضافة أسئلة الفصل ${chapterNum} بعد!`);
                return;
            }

            currentChapter = chapterNum;
            currentIdx = 0;
            score = 0;
            correctFound = false;

            chapterSelector.classList.add('hidden');
            quizContainer.classList.remove('hidden');
            finishScreen.classList.add('hidden');
            initQuiz();
        }

        function initQuiz() {
            correctFound = false;
            actionArea.classList.add('hidden');
            nextBtn.classList.add('hidden');
            
            const quizData = chapterQuestions[currentChapter];
            const current = quizData[currentIdx];
            
            progressText.innerText = `Question ${currentIdx + 1} / ${quizData.length}`;
            scoreText.innerText = `Score: ${score}`;
            qType.innerText = current.type;
            qText.innerText = current.q;
            
            optionsGrid.innerHTML = '';
            current.opts.forEach(opt => {
                const b = document.createElement('button');
                b.innerText = opt;
                b.className = "option-btn w-full text-left p-4 rounded-xl border border-zinc-800 bg-zinc-800/40 hover:border-zinc-600 text-zinc-300 font-medium";
                b.onclick = () => handleSelection(opt, b);
                optionsGrid.appendChild(b);
            });
        }

        function handleSelection(selected, btn) {
            if (correctFound) return;

            const quizData = chapterQuestions[currentChapter];
            const correctAns = quizData[currentIdx].a;
            
            if (selected === correctAns) {
                correctFound = true;
                score++;
                btn.classList.add('correct-choice');
                message.innerText = "Correct! Well done.";
                message.className = "text-lg font-bold mb-4 text-green-500";
                actionArea.classList.remove('hidden');
                nextBtn.classList.remove('hidden');
                
                Array.from(optionsGrid.children).forEach(child => {
                    if (child !== btn) child.style.opacity = "0.3";
                });
            } else {
                btn.classList.add('wrong-choice');
                message.innerText = "Wrong answer, try again...";
                message.className = "text-lg font-bold mb-4 text-red-500";
                actionArea.classList.remove('hidden');
                nextBtn.classList.add('hidden');
            }
        }

        nextBtn.onclick = () => {
            const quizData = chapterQuestions[currentChapter];
            currentIdx++;
            if (currentIdx < quizData.length) {
                initQuiz();
            } else {
                showFinal();
            }
        };

        backBtn.onclick = () => {
            chapterSelector.classList.remove('hidden');
            quizContainer.classList.add('hidden');
            finishScreen.classList.add('hidden');
            initChapterSelector();
        };

        document.getElementById('back-to-chapters-quiz').onclick = () => {
            chapterSelector.classList.remove('hidden');
            quizContainer.classList.add('hidden');
            finishScreen.classList.add('hidden');
            initChapterSelector();
        };

        function showFinal() {
            const quizData = chapterQuestions[currentChapter];
            quizContainer.classList.add('hidden');
            finishScreen.classList.remove('hidden');
            document.getElementById('final-stats').innerText = `You completed all ${quizData.length} questions from Chapter ${currentChapter} with a score of ${score}!`;
        }

        // Start with chapter selector
        initChapterSelector();
    </script>
